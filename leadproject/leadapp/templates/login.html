<!DOCTYPE html>
<html>
<head>
    <title>Lead Management System - Login</title>

    <style>
        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#1e1e2f;
            font-family:Arial, sans-serif;
        }

        .login-box{
            width:380px;
            background:#2b2b3c;
            padding:35px;
            border-radius:12px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:25px;
        }

        label{
            display:block;
            color:#ddd;
            margin-bottom:5px;
            margin-top:15px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#3a3a50;
            color:white;
            box-sizing:border-box;
        }

        input:focus{
            outline:none;
            border:1px solid #4d90fe;
        }

        button{
            width:120px;
            display:block;
            margin:25px auto 0;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#4d90fe;
            color:white;
            font-size:14px;
            cursor:pointer;
        }

        button:hover{
            background:#357ae8;
        }

        .error{
            background:#4a1f1f;
            color:#ffb3b3;
            padding:10px;
            border-radius:6px;
            text-align:center;
            margin-bottom:15px;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h1>Lead Management System</h1>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">
            Login
        </button>

        <p>
            New User?
            <a href="{% url 'register' %}">
                Register Here
            </a>
        </p>
    </form>

</div>

</body>
</html>
