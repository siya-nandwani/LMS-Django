{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="card">
   
    <h2>Regions</h2>

    <a href="{% url 'add_region' %}">
        <button class="btn btn-add">+ Add Region</button>
    </a>
    <div class="search-box">
    <form method="GET">
            <input type="text"
                name="search"
                placeholder="Search Region..."
                value="{{ request.GET.search }}">
            <button type="submit">
                Search
            </button>
        </form>
    </div>
    <table>

        <tr>
            <th>ID</th>
            <th>Region Name</th>
            <th>Actions</th>
        </tr>

        {% for r in regions %}
        <tr>
            <td>{{ r.regionid }}</td>
            <td>{{ r.regionname }}</td>

            <td>
                <a href="{% url 'edit_region' r.regionid %}">
                    <button class="btn btn-edit">Edit</button>
                </a>

                <a href="{% url 'delete_region' r.regionid %}">
                    <button class="btn btn-delete">Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
